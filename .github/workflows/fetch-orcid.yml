name: Fetch ORCID Publications

on:
  schedule:
    - cron: '0 6 * * *'   # runs every day at 6am UTC
  workflow_dispatch:        # lets you trigger it manually from GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch works from ORCID
        run: |
          curl -s \
            -H "Accept: application/json" \
            "https://pub.orcid.org/v3.0/0009-0002-6350-5121/works" \
            -o publications.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add publications.json
          git diff --cached --quiet || git commit -m "chore: update publications from ORCID"
          git push
